name: koltrust

services:
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  cassandra:
    image: cassandra:5.0
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: kol-trust-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 20s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:5.0
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./database/cassandra/schema.cql:/schema.cql:ro
    command: ["sh", "-c", "cqlsh cassandra -f /schema.cql"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  spark-streaming:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    restart: unless-stopped
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - "4040:4040"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: kol_raw_events
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: kol_trust
      SPARK_CHECKPOINT_DIR: /tmp/spark-checkpoints/kol-trust
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      S3_RAW_PATH: s3a://koltrust-raw/streaming/raw_events
      S3_PROCESSED_PATH: s3a://koltrust-processed/streaming/silver/trust_scores
      S3_SERVING_PATH: s3a://koltrust-serving/streaming/trust_scores
    command:
      - spark-submit
      - --master
      - local[2]
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,com.datastax.spark:spark-cassandra-connector_2.12:3.4.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
      - /app/streaming/spark_jobs/trust_streaming_job.py

  api:
    build:
      context: ..
      dockerfile: realtime-kol-trust/docker/Dockerfile.app
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: kol_trust
    command: ["uvicorn", "backend.fastapi.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
      - ../koltrust_common:/app/koltrust_common:ro

  dashboard:
    build:
      context: ..
      dockerfile: realtime-kol-trust/docker/Dockerfile.app
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      APP_ENV: dev
      API_BASE_URL: http://api:8000
    command: ["streamlit", "run", "dashboard/streamlit/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    volumes:
      - .:/app
      - ../koltrust_common:/app/koltrust_common:ro

  simulator:
    build:
      context: ..
      dockerfile: livestream-simulator/Dockerfile
    ports:
      - "8010:8010"
    environment:
      KOLTRUST_DATASET_ROOT: /workspace/realtime-kol-trust/dataset
    volumes:
      - ./dataset:/workspace/realtime-kol-trust/dataset:ro
      - ../koltrust_common:/workspace/koltrust_common:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  replay-producer:
    build:
      context: ..
      dockerfile: realtime-kol-trust/docker/Dockerfile.app
    depends_on:
      kafka:
        condition: service_started
      simulator:
        condition: service_healthy
    environment:
      APP_ENV: dev
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: kol_raw_events
      SIMULATOR_BASE_URL: http://simulator:8010
      REPLAY_INTERVAL_SECONDS: 2
    command:
      [
        "python",
        "kafka/producers/replay_events.py",
        "--source",
        "simulator",
        "--simulator-base-url",
        "http://simulator:8010",
        "--loop",
      ]
    volumes:
      - .:/app
      - ../koltrust_common:/app/koltrust_common:ro

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Waiting for MinIO..."
          sleep 3
        done
        mc mb --ignore-existing local/koltrust-raw
        mc mb --ignore-existing local/koltrust-processed
        mc mb --ignore-existing local/koltrust-serving

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      _PIP_ADDITIONAL_REQUIREMENTS: pandas>=2.1.2,<2.2 pandera>=0.20.0 scikit-learn>=1.4.0 joblib>=1.3.0 requests>=2.31.0 python-dotenv>=1.0.1 boto3>=1.34.0
    volumes:
      - airflow-home:/opt/airflow
      - ../airflow/dags:/opt/airflow/dags:ro
      - ..:/opt/airflow/project
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname KOL --lastname Trust --role Admin --email admin@example.com --password admin || true"

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow-home:/opt/airflow
      - ../airflow/dags:/opt/airflow/dags:ro
      - ..:/opt/airflow/project
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow-home:/opt/airflow
      - ../airflow/dags:/opt/airflow/dags:ro
      - ..:/opt/airflow/project
    command: scheduler

volumes:
  kafka-data:
  cassandra-data:
  minio-data:
  prometheus-data:
  grafana-data:
  airflow-home:
